# NÃO precisa disso mais
# version: "3.9"

# ──────────────────────────────────────────────────────────────
#  Sports Realtime Platform — Docker Compose (Fase 1)
#  Pipeline: Zookeeper → Kafka → Kafka Init → Postgres → Producer → Consumer
# ──────────────────────────────────────────────────────────────

networks:
  sports-net:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:

services:

  # ── Zookeeper (required by Kafka) ────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    networks: [sports-net]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka Broker (core do pipeline) ──────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    networks: [sports-net]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      # Identificação do broker
      KAFKA_BROKER_ID: 1

      # Conexão com Zookeeper
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Configuração de listeners (interno vs externo)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL

      # Configurações gerais
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24

    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Kafka Init (criação automática dos tópicos) ──────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    networks: [sports-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "
      echo '⏳ Creating Kafka topics...' &&
      kafka-topics --create --if-not-exists --topic sports.matches --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --topic sports.stats --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --topic sports.player_events --bootstrap-server kafka:29092 --partitions 1 --replication-factor 1 &&
      echo '✅ Topics created successfully!'
      "

  # ── Kafka UI (visualização dos tópicos) ──────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    networks: [sports-net]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  # ── PostgreSQL (armazenamento dos dados) ─────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    networks: [sports-net]
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    environment:
      POSTGRES_DB: sportsdb
      POSTGRES_USER: sports_user
      POSTGRES_PASSWORD: sports_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sports_user -d sportsdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Producer (gera eventos em tempo real) ────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    networks: [sports-net]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      # Broker interno do Kafka (entre containers)
      KAFKA_BROKER: kafka:29092
    restart: on-failure

  # ── Consumer (processa e salva no banco) ─────────────────────
  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: consumer
    networks: [sports-net]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      # Kafka
      KAFKA_BROKER: kafka:29092

      # Banco de dados
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sportsdb
      DB_USER: sports_user
      DB_PASSWORD: sports_pass
    restart: on-failure

    # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    networks: [sports-net]
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DB_HOST:     postgres
      DB_PORT:     "5432"
      DB_NAME:     sportsdb
      DB_USER:     sports_user
      DB_PASSWORD: sports_pass
    restart: on-failure

    # ── Dashboard ────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    networks: [sports-net]
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8501:8501"
    environment:
      API_URL: http://backend:8000
    restart: on-failure